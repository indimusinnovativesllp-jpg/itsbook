  en: { Fiction: "Fiction", Mystery: "Mystery", "Sci-Fi": "Sci-Fi", Fantasy: "Fantasy", Romance: "Romance", Nonfiction: "Nonfiction", Children: "Children" },
  hi: { Fiction: "कथा-साहित्य", Mystery: "रहस्य", "Sci-Fi": "विज्ञान-कथा", Fantasy: "फ़ैंटेसी", Romance: "रोमांस", Nonfiction: "गैर-कथा", Children: "बच्चों की" },
  ml: { Fiction: "ഫിക്ഷൻ", Mystery: "നിഗൂഢത", "Sci-Fi": "ശാസ്ത്രകഥ", Fantasy: "ഫാന്റസി", Romance: "റൊമാൻസ്", Nonfiction: "നോൺഫിക്ഷൻ", Children: "കുട്ടികളുടെ" },
};

function getLanguage() {
  return localStorage.getItem("marginalia_lang") || "en";
}

function setLanguage(lang) {
  localStorage.setItem("marginalia_lang", lang);
  window.location.reload();
}

function t(key, vars) {
  const lang = getLanguage();
  let str = (DICT[lang] && DICT[lang][key]) ?? DICT.en[key] ?? key;
  if (vars) {
    Object.entries(vars).forEach(([k, v]) => { str = str.replace(`{${k}}`, v); });
  }
  return str;
}

function genreLabel(genre) {
  const lang = getLanguage();
  return (GENRE_LABELS[lang] && GENRE_LABELS[lang][genre]) || genre;
}

function applyStaticTranslations() {
  const lang = getLanguage();
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    el.setAttribute("placeholder", t(el.getAttribute("data-i18n-placeholder")));
  });
  document.querySelectorAll("[data-lang-select]").forEach(sel => {
    sel.value = lang;
  });
}

document.addEventListener("DOMContentLoaded", () => {
  applyStaticTranslations();
  document.querySelectorAll("[data-lang-select]").forEach(sel => {
    sel.addEventListener("change", (e) => setLanguage(e.target.value));
  });
});
